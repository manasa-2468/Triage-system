<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Hospital Triage System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='hospital.css') }}">
</head>
<body>
    <div class="container">
        <h1>Smart Hospital Triage System</h1>
        <form id="triageForm">
            <label for="name">Patient Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required>

            <label for="symptoms">Number of Symptoms:</label>
            <input type="number" id="symptoms" name="symptoms" required>

            <button type="submit">Check Patient Condition</button>
        </form>

        <div id="result"></div>
    </div>

    <script src="{{ url_for('static', filename='hospital.js') }}"></script>
</body>
</html>
